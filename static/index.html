<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Trade Opportunities API Interface">
    <title>Trade Opportunities AI</title>
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="background-glob glob-1"></div>
    <div class="background-glob glob-2"></div>

    <nav class="navbar">
        <div class="brand">
            <span class="icon">🇮🇳</span>
            <h1>Trade AI</h1>
        </div>
        <div class="auth-section" id="authSection">
            <input type="text" id="usernameInput" placeholder="Enter username" class="input-modern" />
            <button id="loginBtn" class="btn-primary">Connect</button>
        </div>
        <div class="user-profile" id="userProfile" style="display: none;">
            <span id="welcomeText" class="welcome-text"></span>
            <button id="logoutBtn" class="btn-secondary">Disconnect</button>
        </div>
    </nav>

    <main class="container">
        <!-- Dashboard (Hidden until logged in) -->
        <section id="dashboard" class="dashboard glass-card" style="display: none;">
            <div class="analyze-controls">
                <h2>Analyze Sector</h2>
                <div class="input-group">
                    <input type="text" id="sectorInput" placeholder="e.g. technology, pharmaceuticals..."
                        class="input-modern large" />
                    <button id="analyzeBtn" class="btn-primary large">
                        <span class="btn-text">Generate Report</span>
                        <div class="loader-spinner hidden" id="analyzeLoader"></div>
                    </button>
                </div>
                <div class="supported-sectors">
                    Supported: agriculture, aerospace, automotive, chemicals, defence, education, electronics, energy,
                    finance...
                </div>
            </div>

            <div id="sessionStats" class="session-stats">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Login Prompt -->
        <section id="loginPrompt" class="glass-card text-center fade-in">
            <h2>Welcome to Trade Opportunities AI</h2>
            <p>Connect with any username to begin exploring market insights generated by Gemini.</p>
        </section>

        <!-- Report Container -->
        <section id="reportContainer" class="report-container glass-card" style="display: none;">
            <div class="report-header">
                <h2>Market Report: <span id="reportSector"></span></h2>
                <div class="report-meta" id="reportMeta"></div>
            </div>
            <div class="markdown-body" id="markdownOutput"></div>
        </section>
    </main>

    <script src="/script.js"></script>
</body>

</html>
